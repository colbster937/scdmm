on:
  push:
    paths:
      - 'src/**'
      - 'pom.xml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      - id: vars
        run: |
          echo "AFCT=$(mvn git-commit-id:revision help:evaluate -Dexpression=project.build.finalName -q -DforceStdout)" >> "$GITHUB_OUTPUT"
          echo "VERS=$(mvn git-commit-id:revision help:evaluate -Dexpression=mod.vers -q -DforceStdout)" >> "$GITHUB_OUTPUT"
          echo "IDEN=$(mvn help:evaluate -Dexpression=mod.iden -q -DforceStdout)" >> "$GITHUB_OUTPUT"
      - run: mvn -B -DskipTests package
      - uses: actions/upload-artifact@v7
        with:
          path: target/${{ steps.vars.outputs.AFCT }}.jar
          name: ${{ steps.vars.outputs.AFCT }}
          if-no-files-found: error
      - id: mrtoken
        run: |
          echo "STATUS=$([ -n "${{ secrets.MODRINTH_TOKEN }}" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - id: mrinfo
        if: ${{ steps.mrtoken.outputs.STATUS == 'true' }}
        run: |
          echo "PROJECT_ID=$(curl -s "https://api.modrinth.com/v2/project/${{ steps.vars.outputs.IDEN }}" -H "Authorization: Bearer ${{ secrets.MODRINTH_TOKEN }}" | jq -r '.id')" >> "$GITHUB_OUTPUT"
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.mrtoken.outputs.STATUS == 'true'
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ steps.mrinfo.outputs.PROJECT_ID }}
          version: ${{ steps.vars.outputs.VERS }}
          loaders: '["fabric", "legacy-fabric", "ornithe"]'
          game-versions: '["1.6.x", "1.7.x", "1.8.x", "1.9.x", "1.10.x", "1.11.x", "1.12.x", "1.13.x", "1.14.x", "1.15.x", "1.16.x", "1.17.x", "1.18.x", "1.19.x", "1.20.x", "1.21.x", "26.1.x", "26.2"]'
          files: target/${{ steps.vars.outputs.AFCT }}.jar
          primary-file: ${{ steps.vars.outputs.AFCT }}
          name: ${{ steps.vars.outputs.VERS }}
          channel: 'beta'